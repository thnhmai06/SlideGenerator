name: "[Backend] Qodana"

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    paths:
      - "backend/src/**"
      - "backend/Directory.Build.props"
      - "backend/Directory.Packages.props"
      - "backend/global.json"
      - "backend/*.slnx"
      - ".github/workflows/qodana.yml"

permissions:
  contents: write
  pull-requests: write
  checks: write
  packages: read

jobs:
  qodana:
    name: Qodana Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: backend/global.json

      - name: Configure NuGet credentials
        run: |
          dotnet nuget update source SlideGenerator.OpenCvSharp \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --configfile backend/nuget.config

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          args: --project-dir backend
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Upload Qodana results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qodana-results-${{ github.run_attempt }}
          path: ${{ runner.temp }}/qodana/results/
          if-no-files-found: warn
          retention-days: 14
