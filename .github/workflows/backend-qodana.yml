name: "[Backend] Qodana"

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    paths:
      - "backend/src/**"
      - "backend/Directory.Build.props"
      - "backend/Directory.Packages.props"
      - "backend/global.json"
      - "backend/*.slnx"
      - ".github/workflows/backend-qodana.yml"

permissions:
  contents: write
  pull-requests: write
  checks: write
  packages: read

jobs:
  qodana:
    name: Qodana Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: backend/global.json

      - name: Configure NuGet credentials
        run: |
          dotnet nuget update source SlideGenerator.OpenCvSharp \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --configfile backend/nuget.config

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          args: --project-dir backend
          results-dir: ${{ runner.temp }}/qodana/results
          cache-dir: ${{ runner.temp }}/qodana/cache
          upload-result: true
          artifact-name: qodana-report
          pr-mode: ${{ github.event_name == 'pull_request' }}
          post-pr-comment: true
          github-token: ${{ github.token }}
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
