name: Backend CI

on:
  push:
  pull_request:
    paths:
      - "backend/**/*"
      - "Taskfile.yml"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  SYNCFUSION_LICENSE_KEY: ${{ secrets.SYNCFUSION_LICENSE_KEY || 'empty' }}

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    name: Check CI gate
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.skip.outputs.should-run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Check skip prefix
        id: skip
        shell: bash
        run: |
          message="$(git log -1 --pretty=%B)"
          if [[ "$message" == "[skip ci]"* ]]; then
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Per-OS pipeline ──────────────────────────────────────────────────────────
  # Each OS runs independently: build → Foundation → Domain → Application.
  # Tests start as soon as that OS's build finishes — no cross-OS waiting.
  pipeline:
    name: ${{ matrix.os.name }}
    needs: ci-gate
    if: ${{ needs.ci-gate.outputs.should-run == 'true' }}
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: windows-x64, runner: windows-latest     }
          - { name: linux-x64,   runner: ubuntu-24.04       }
          - { name: linux-arm64, runner: ubuntu-24.04-arm   }
          - { name: macos-x64,   runner: macos-13           }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: backend/global.json

      # ── Native dependencies (linux-arm64 only) ──────────────────────────────────
      - name: Install native dependencies
        if: matrix.os.name == 'linux-arm64'
        run: |
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            ffmpeg

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Restore
        working-directory: backend
        run: dotnet restore SlideGenerator.slnx

      - name: Build
        id: build
        working-directory: backend
        run: dotnet build SlideGenerator.slnx --no-restore

      # ── Foundation: Utilities, Cryptography, Cloud, Settings ───────────────
      - name: "Test [Foundation] / Utilities"
        if: always() && steps.build.outcome == 'success'
        working-directory: backend
        run: >-
          dotnet test
          tests/SlideGenerator.Utilities.Tests/SlideGenerator.Utilities.Tests.csproj
          --no-restore
          --logger "trx;LogFilePrefix=SlideGenerator.Utilities.Tests"
          --results-directory TestResults

      - name: "Test [Foundation] / Cryptography"
        if: always() && steps.build.outcome == 'success'
        working-directory: backend
        run: >-
          dotnet test
          tests/SlideGenerator.Cryptography.Tests/SlideGenerator.Cryptography.Tests.csproj
          --no-restore
          --logger "trx;LogFilePrefix=SlideGenerator.Cryptography.Tests"
          --results-directory TestResults

      - name: "Test [Foundation] / Cloud"
        if: always() && steps.build.outcome == 'success'
        working-directory: backend
        run: >-
          dotnet test
          tests/SlideGenerator.Cloud.Tests/SlideGenerator.Cloud.Tests.csproj
          --no-restore
          --logger "trx;LogFilePrefix=SlideGenerator.Cloud.Tests"
          --results-directory TestResults

      - name: "Test [Foundation] / Settings"
        if: always() && steps.build.outcome == 'success'
        working-directory: backend
        run: >-
          dotnet test
          tests/SlideGenerator.Settings.Tests/SlideGenerator.Settings.Tests.csproj
          --no-restore
          --logger "trx;LogFilePrefix=SlideGenerator.Settings.Tests"
          --results-directory TestResults

      # ── Domain: Coordinator, Document ──────────────────────────────────────
      - name: "Test [Domain] / Coordinator"
        if: always() && steps.build.outcome == 'success'
        working-directory: backend
        run: >-
          dotnet test
          tests/SlideGenerator.Coordinator.Tests/SlideGenerator.Coordinator.Tests.csproj
          --no-restore
          --logger "trx;LogFilePrefix=SlideGenerator.Coordinator.Tests"
          --results-directory TestResults

      - name: "Test [Domain] / Document"
        if: always() && steps.build.outcome == 'success'
        working-directory: backend
        run: >-
          dotnet test
          tests/SlideGenerator.Document.Tests/SlideGenerator.Document.Tests.csproj
          --no-restore
          --logger "trx;LogFilePrefix=SlideGenerator.Document.Tests"
          --results-directory TestResults

      # ── Application: Image, Recipe, Generator, Stdio ───────────────────────
      - name: "Test [Application] / Image"
        if: always() && steps.build.outcome == 'success'
        working-directory: backend
        run: >-
          dotnet test
          tests/SlideGenerator.Image.Tests/SlideGenerator.Image.Tests.csproj
          --no-restore
          --logger "trx;LogFilePrefix=SlideGenerator.Image.Tests"
          --results-directory TestResults

      - name: "Test [Application] / Recipe"
        if: always() && steps.build.outcome == 'success'
        working-directory: backend
        run: >-
          dotnet test
          tests/SlideGenerator.Recipe.Tests/SlideGenerator.Recipe.Tests.csproj
          --no-restore
          --logger "trx;LogFilePrefix=SlideGenerator.Recipe.Tests"
          --results-directory TestResults

      - name: "Test [Application] / Generator"
        if: always() && steps.build.outcome == 'success'
        working-directory: backend
        run: >-
          dotnet test
          tests/SlideGenerator.Generator.Tests/SlideGenerator.Generator.Tests.csproj
          --no-restore
          --logger "trx;LogFilePrefix=SlideGenerator.Generator.Tests"
          --results-directory TestResults

      - name: "Test [Application] / Stdio"
        if: always() && steps.build.outcome == 'success'
        working-directory: backend
        run: >-
          dotnet test
          tests/SlideGenerator.Stdio.Tests/SlideGenerator.Stdio.Tests.csproj
          --no-restore
          --logger "trx;LogFilePrefix=SlideGenerator.Stdio.Tests"
          --results-directory TestResults

      # ── Upload ─────────────────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os.name }}-${{ github.run_attempt }}
          path: backend/TestResults/**/*.trx
          if-no-files-found: warn
          retention-days: 14
