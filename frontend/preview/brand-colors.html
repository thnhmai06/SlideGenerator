<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Brand Colors</title>
</head>
<body>
<div class="card">
  <p class="eyebrow">Brand palette — mark only, not UI accents</p>
  <div class="card-row">
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:#1a2785"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Brand Navy</span>
        <span class="swatch-value">#1a2785 · --brand-navy</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:#0f1a5e"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Brand Navy Deep</span>
        <span class="swatch-value">#0f1a5e · --brand-navy-deep</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:#1f7ef0"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Brand Cyan</span>
        <span class="swatch-value">#1f7ef0 · --brand-cyan</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:#5aa9ff"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Brand Cyan Soft</span>
        <span class="swatch-value">#5aa9ff · --brand-cyan-soft</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
