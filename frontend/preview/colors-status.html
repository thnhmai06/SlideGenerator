<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Status Colors</title>
</head>
<body>
<div class="card">
  <p class="eyebrow">Slide / job status colors</p>
  <div class="card-row">
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.72 0.16 156)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Success</span>
        <span class="swatch-value">--slide-success</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.78 0.14 78)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Warning</span>
        <span class="swatch-value">--slide-warning</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.6368 0.2078 25.33)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Destructive / Error</span>
        <span class="swatch-value">--destructive</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.70 0.13 230)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Info</span>
        <span class="swatch-value">--slide-info</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
