<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Hellix — Headings</title>
<style>
.specimen { font-family: "Hellix", "Space Grotesk", sans-serif; color: var(--foreground); }
.giant { font-size: 56px; font-weight: 600; letter-spacing: -0.025em; line-height: 1; margin: 4px 0 12px; }
.row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border: none; }
.row .label {
  flex: 0 0 96px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted-foreground);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.row .sample { font-size: 22px; letter-spacing: -0.02em; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Heading · Hellix · from unsloth-studio · `--font-heading`</p>
  <div class="specimen">
    <div class="giant">Generate slides at scale.</div>
    <div>
      <div class="row"><span class="label">400 Regular</span><span class="sample" style="font-weight:400">Configure replacements once, run the batch.</span></div>
      <div class="row"><span class="label">500 Medium</span><span class="sample" style="font-weight:500">Configure replacements once, run the batch.</span></div>
      <div class="row"><span class="label">600 SemiBold</span><span class="sample" style="font-weight:600">Configure replacements once, run the batch.</span></div>
    </div>
  </div>
</div>
</body>
</html>
