<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Spacing</title>
<style>
.scale { display: flex; flex-direction: column; gap: 8px; }
.s-row { display: grid; grid-template-columns: 80px 80px 1fr; align-items: center; gap: 12px; }
.s-token { font-family: var(--font-mono); font-size: 11px; color: var(--foreground); }
.s-value { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
.s-bar { height: 12px; background: oklch(0.6929 0.1396 250); border-radius: 4px; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Spacing — base unit 0.25rem (4px)</p>
  <div class="scale">
    <div class="s-row"><span class="s-token">space-1</span><span class="s-value">4px</span><span class="s-bar" style="width:4px"></span></div>
    <div class="s-row"><span class="s-token">space-2</span><span class="s-value">8px</span><span class="s-bar" style="width:8px"></span></div>
    <div class="s-row"><span class="s-token">space-3</span><span class="s-value">12px</span><span class="s-bar" style="width:12px"></span></div>
    <div class="s-row"><span class="s-token">space-4</span><span class="s-value">16px</span><span class="s-bar" style="width:16px"></span></div>
    <div class="s-row"><span class="s-token">space-5</span><span class="s-value">20px</span><span class="s-bar" style="width:20px"></span></div>
    <div class="s-row"><span class="s-token">space-6</span><span class="s-value">24px</span><span class="s-bar" style="width:24px"></span></div>
    <div class="s-row"><span class="s-token">space-8</span><span class="s-value">32px</span><span class="s-bar" style="width:32px"></span></div>
    <div class="s-row"><span class="s-token">space-10</span><span class="s-value">40px</span><span class="s-bar" style="width:40px"></span></div>
    <div class="s-row"><span class="s-token">space-12</span><span class="s-value">48px</span><span class="s-bar" style="width:48px"></span></div>
  </div>
</div>
</body>
</html>
