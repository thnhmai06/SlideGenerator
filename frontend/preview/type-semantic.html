<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Semantic Type</title>
<style>
.stack { display: flex; flex-direction: column; gap: 8px; }
.stack > * { margin: 0; }
h1.specimen { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; }
h2.specimen { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; }
h3.specimen { font-size: 20px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.3; }
p.specimen  { font-size: 14px; line-height: 1.55; max-width: 580px; }
.spec-label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted-foreground); }
.spec-code  { font-family: var(--font-mono); font-size: 13px; background: var(--muted); border: 1px solid var(--border); padding: 1px 6px; border-radius: 6px; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Semantic specimens</p>
  <div class="stack">
    <h1 class="specimen">Create Task</h1>
    <h2 class="specimen">Image Replacement</h2>
    <h3 class="specimen">Server settings</h3>
    <p class="specimen">Software to generate PowerPoint slides from spreadsheet data. Configure replacements once, run the batch, download the deck.</p>
    <p style="display:flex; gap:8px; align-items:center;"><span class="spec-label">Eyebrow</span><span class="spec-code">{{placeholder.title}}</span></p>
  </div>
</div>
</body>
</html>
