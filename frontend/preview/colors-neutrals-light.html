<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Neutrals — Light</title>
</head>
<body>
<div class="card">
  <p class="eyebrow">Neutrals — Light</p>
  <div class="card-row">
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(1 0 0)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Background / Card</span>
        <span class="swatch-value">oklch(1 0 0)</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.99 0 0)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Sidebar</span>
        <span class="swatch-value">oklch(0.99 0 0)</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.97 0 0)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Muted</span>
        <span class="swatch-value">oklch(0.97 0 0)</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.92 0.01 250)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Border / Input</span>
        <span class="swatch-value">oklch(0.92 0.01 250)</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.55 0 0)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Muted FG</span>
        <span class="swatch-value">oklch(0.55 0 0)</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.27 0 0)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Foreground</span>
        <span class="swatch-value">oklch(0.27 0 0)</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
