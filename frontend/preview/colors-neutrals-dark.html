<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Neutrals — Dark</title>
<style>
  body { background: #1a1b1e; color: #d4d4d4; }
  .swatch-name { color: #d4d4d4; }
  .swatch-value { color: #999; }
  .eyebrow { color: #999; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Neutrals — Dark</p>
  <div class="card-row">
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:#1a1b1e; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Background</span>
        <span class="swatch-value">#1a1b1e</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:#222427; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Card / Sidebar</span>
        <span class="swatch-value">#222427</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:#2e3035"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Muted / Border</span>
        <span class="swatch-value">#2e3035</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:#3a3d42"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Input</span>
        <span class="swatch-value">#3a3d42</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:#999"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Muted FG</span>
        <span class="swatch-value">#999999</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:#d4d4d4"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Foreground</span>
        <span class="swatch-value">#d4d4d4</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
