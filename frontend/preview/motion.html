<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Motion</title>
<style>
.row { display: flex; gap: 24px; flex-wrap: wrap; }
.m-card {
  flex: 1 1 240px;
  padding: 16px;
  border-radius: 18px;
  box-shadow: inset 0 0 0 1px oklch(0 0 0 / 0.08);
  background: var(--card);
  display: flex; flex-direction: column; gap: 10px;
}
.m-key { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
.m-name { font-size: 14px; font-weight: 600; }
.m-curve {
  height: 56px;
  background:
    linear-gradient(transparent calc(50% - 1px), oklch(0 0 0 / 0.06) calc(50% - 1px), oklch(0 0 0 / 0.06) calc(50% + 1px), transparent calc(50% + 1px));
  position: relative;
  overflow: hidden;
}
.m-curve svg { width: 100%; height: 100%; }
.m-curve path { fill: none; stroke: oklch(0.6929 0.1396 250); stroke-width: 2; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Motion · two durations · two curves · no springs</p>
  <div class="row">
    <div class="m-card">
      <span class="m-name">--duration-fast</span>
      <span class="m-key">150ms · hover / state</span>
      <div class="m-curve">
        <svg viewBox="0 0 100 56" preserveAspectRatio="none">
          <path d="M 0 56 C 17 9, 44 5, 100 0" />
        </svg>
      </div>
      <span class="m-key">ease-out-quart (0.165, 0.84, 0.44, 1)</span>
    </div>
    <div class="m-card">
      <span class="m-name">--duration-normal</span>
      <span class="m-key">200ms · layout / route</span>
      <div class="m-curve">
        <svg viewBox="0 0 100 56" preserveAspectRatio="none">
          <path d="M 0 56 C 22 22, 36 8, 100 0" />
        </svg>
      </div>
      <span class="m-key">ease-out-cubic (0.215, 0.61, 0.355, 1)</span>
    </div>
  </div>
</div>
</body>
</html>
