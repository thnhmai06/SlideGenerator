<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../components.css" />
<link rel="stylesheet" href="_card.css" />
<title>Badges</title>
<style>
.row { display: flex; flex-wrap: wrap; gap: 8px; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Badges · 6 variants · uppercased / sentence-cased mix</p>
  <div class="row">
    <span class="sg-badge sg-badge--default">Default</span>
    <span class="sg-badge sg-badge--secondary">Secondary</span>
    <span class="sg-badge sg-badge--outline">Outline</span>
    <span class="sg-badge sg-badge--destructive">Destructive</span>
    <span class="sg-badge sg-badge--success">Success</span>
    <span class="sg-badge sg-badge--warning">Warning</span>
  </div>
  <p class="eyebrow" style="margin-top:4px">Usage — small numerical + label patterns</p>
  <div class="row">
    <span class="sg-badge sg-badge--secondary">12 sheets</span>
    <span class="sg-badge sg-badge--secondary">1,408 rows</span>
    <span class="sg-badge sg-badge--outline">.pptx</span>
    <span class="sg-badge sg-badge--outline">.xlsx</span>
    <span class="sg-badge sg-badge--success">Loaded</span>
    <span class="sg-badge sg-badge--warning">Not loaded</span>
  </div>
</div>
</body>
</html>
