<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../components.css" />
<link rel="stylesheet" href="_card.css" />
<title>Status Pills</title>
<style>
.row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  height: 24px; padding: 0 10px;
  border-radius: 9999px;
  font-family: var(--font-sans); font-size: 12px; font-weight: 500;
  border: 1px solid var(--border);
  background: color-mix(in oklch, var(--input) 30%, transparent);
  color: var(--foreground);
}
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Job status pills · used in Process + Results view</p>
  <div class="row">
    <span class="pill"><span class="sg-dot sg-dot--processing"></span>Processing</span>
    <span class="pill"><span class="sg-dot sg-dot--paused"></span>Paused</span>
    <span class="pill"><span class="sg-dot sg-dot--success"></span>Completed</span>
    <span class="pill"><span class="sg-dot sg-dot--error"></span>Error</span>
    <span class="pill"><span class="sg-dot sg-dot--pending"></span>Pending</span>
    <span class="pill"><span class="sg-dot sg-dot--cancelled"></span>Cancelled</span>
  </div>
</div>
</body>
</html>
