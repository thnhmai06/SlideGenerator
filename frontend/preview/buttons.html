<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../components.css" />
<link rel="stylesheet" href="_card.css" />
<title>Buttons</title>
<style>
.row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.row-sep { margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Buttons · pill · rounded-4xl · 6 variants</p>
  <div class="row">
    <button class="sg-btn sg-btn--primary">Create Task</button>
    <button class="sg-btn sg-btn--dark">Start</button>
    <button class="sg-btn sg-btn--secondary">Browse</button>
    <button class="sg-btn sg-btn--outline">Import</button>
    <button class="sg-btn sg-btn--ghost">Cancel</button>
    <button class="sg-btn sg-btn--destructive">Clear All</button>
  </div>
  <p class="eyebrow row-sep">Sizes — xs · sm · default · lg</p>
  <div class="row">
    <button class="sg-btn sg-btn--primary sg-btn--xs">xs</button>
    <button class="sg-btn sg-btn--primary sg-btn--sm">Small</button>
    <button class="sg-btn sg-btn--primary">Default</button>
    <button class="sg-btn sg-btn--primary sg-btn--lg">Large action</button>
    <button class="sg-btn sg-btn--outline sg-btn--icon" aria-label="More">⋯</button>
  </div>
</div>
</body>
</html>
