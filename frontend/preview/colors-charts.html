<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Chart Palette</title>
</head>
<body>
<div class="card">
  <p class="eyebrow">Chart series — recharts in process / results view</p>
  <div class="card-row">
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.6929 0.1396 250)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Chart 1 — blue</span>
        <span class="swatch-value">--chart-1</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.6940 0.1395 136.61)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Chart 2 — green</span>
        <span class="swatch-value">--chart-2</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.7014 0.1193 197.59)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Chart 3 — cyan</span>
        <span class="swatch-value">--chart-3</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.6926 0.1112 346.58)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Chart 4 — pink</span>
        <span class="swatch-value">--chart-4</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.7497 0.1003 85.01)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Chart 5 — amber</span>
        <span class="swatch-value">--chart-5</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
