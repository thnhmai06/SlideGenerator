<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Primary — Blue</title>
</head>
<body>
<div class="card">
  <p class="eyebrow">Primary (UI accent) — blue, oklch</p>
  <div class="card-row">
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.95 0.04 250)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Secondary / Accent</span>
        <span class="swatch-value">oklch(0.96 0.03 250)</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.8 0.12 250)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Primary / 80</span>
        <span class="swatch-value">oklch(0.80 0.12 250)</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.6929 0.1396 250)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Primary · --primary</span>
        <span class="swatch-value">oklch(0.69 0.14 250)</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.55 0.13 250)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Primary Hover</span>
        <span class="swatch-value">oklch(0.55 0.13 250)</span>
      </div>
    </div>
    <div class="swatch" style="flex:1">
      <div class="swatch-chip" style="background:oklch(0.29 0.065 250)"></div>
      <div class="swatch-meta">
        <span class="swatch-name">Primary FG</span>
        <span class="swatch-value">oklch(0.29 0.06 250)</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
