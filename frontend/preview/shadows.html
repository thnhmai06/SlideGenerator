<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Shadows</title>
<style>
.row { display: flex; gap: 28px; padding: 12px 0; }
.t {
  width: 130px; height: 96px; border-radius: 18px;
  background: var(--card);
  box-shadow: inset 0 0 0 1px oklch(0 0 0 / 0.06);
  display: grid; place-items: center;
}
.t.s1 { box-shadow: 0 1px 2px oklch(0 0 0 / 0.04); }
.t.s2 { box-shadow: 0 1px 2px oklch(0 0 0 / 0.04), 0 6px 14px oklch(0 0 0 / 0.05); }
.t.s3 { box-shadow: 0 1px 2px oklch(0 0 0 / 0.04), 0 6px 14px oklch(0 0 0 / 0.05), 0 18px 40px oklch(0 0 0 / 0.05); }
.t.s4 { box-shadow: 0 12px 28px oklch(0 0 0 / 0.10), 0 28px 60px oklch(0 0 0 / 0.10); }
.t-meta { display: flex; flex-direction: column; gap: 2px; margin-top: 8px; align-items: center; }
.t-name { font-size: 12px; font-weight: 600; color: var(--foreground); }
.t-tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted-foreground); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Shadows — near-flat. Use sparingly.</p>
  <div class="row">
    <div>
      <div class="t s1"><span class="t-tok">xs</span></div>
      <div class="t-meta"><span class="t-name">xs</span><span class="t-tok">card hover</span></div>
    </div>
    <div>
      <div class="t s2"><span class="t-tok">sm</span></div>
      <div class="t-meta"><span class="t-name">sm</span><span class="t-tok">composer / chat</span></div>
    </div>
    <div>
      <div class="t s3"><span class="t-tok">md</span></div>
      <div class="t-meta"><span class="t-name">md</span><span class="t-tok">popover / dropdown</span></div>
    </div>
    <div>
      <div class="t s4"><span class="t-tok">lg</span></div>
      <div class="t-meta"><span class="t-name">lg</span><span class="t-tok">modal / preview</span></div>
    </div>
  </div>
</div>
</body>
</html>
