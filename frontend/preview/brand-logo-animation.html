<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Logo Animation</title>
<style>
.row       { display: flex; flex-direction: column; gap: 20px; }
.anim-row  { display: flex; align-items: center; gap: 16px; }
.anim-label {
  font-family: var(--font-mono, monospace);
  font-size: 11px;
  color: var(--muted-foreground);
  width: 80px;
  flex-shrink: 0;
}
.replay-btn {
  margin-left: auto;
  padding: 4px 12px;
  font-size: 11px;
  font-family: var(--font-sans, sans-serif);
  border: 1px solid var(--border);
  border-radius: 999px;
  background: transparent;
  color: var(--muted-foreground);
  cursor: pointer;
  transition: background 150ms ease, color 150ms ease;
}
.replay-btn:hover {
  background: var(--muted);
  color: var(--foreground);
}
.divider { height: 1px; background: var(--border); margin: 4px 0; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Brand · Logo Animation</p>

  <div class="row">

    <div class="anim-row">
      <span class="anim-label">72 px · About</span>
      <logo-animation id="lg" height="72"
        icon-src="../assets/app-icon.png"
        name-src="../assets/app-name.png">
      </logo-animation>
    </div>

    <div class="divider"></div>

    <div class="anim-row">
      <span class="anim-label">40 px · Header</span>
      <logo-animation id="md" height="40"
        icon-src="../assets/app-icon.png"
        name-src="../assets/app-name.png">
      </logo-animation>
    </div>

    <div class="anim-row">
      <span class="anim-label">28 px · Sidebar</span>
      <logo-animation id="sm" height="28"
        icon-src="../assets/app-icon.png"
        name-src="../assets/app-name.png">
      </logo-animation>
      <button class="replay-btn" id="replay">Replay all</button>
    </div>

  </div>
</div>

<script src="../assets/logo-animation.js"></script>
<script>
  document.getElementById("replay").addEventListener("click", function () {
    ["lg", "md", "sm"].forEach(function (id) {
      document.getElementById(id).play();
    });
  });
</script>
</body>
</html>
