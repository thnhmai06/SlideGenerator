<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlideGenerator — Studio UI Kit</title>
<link rel="icon" href="../../assets/app-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../app/styles.css">
<style>
  .components-menu {
    position: relative;
  }

  .components-trigger {
    height: 38px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 0 14px;
    border-radius: var(--r-pill);
    color: var(--tx-mute);
    font-size: var(--f-sm);
    font-weight: 800;
    transition: background var(--tr-fast), color var(--tr-fast);
  }

  .components-trigger:hover,
  .components-trigger:focus-visible {
    background: var(--surf-hover);
    color: var(--tx);
    outline: none;
  }

  .components-panel {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    z-index: 300;
    min-width: 210px;
    padding: 8px;
    border-radius: var(--r-lg);
    border: 1px solid var(--bd);
    background: var(--surf);
    box-shadow: var(--shadow-md);
    display: none;
  }

  .components-menu:hover .components-panel,
  .components-menu:focus-within .components-panel {
    display: grid;
    gap: 3px;
  }

  .components-panel a {
    display: flex;
    align-items: center;
    min-height: 34px;
    padding: 7px 10px;
    border-radius: var(--r-md);
    color: var(--tx-mute);
    font-size: var(--f-sm);
    font-weight: 700;
    text-decoration: none;
  }

  .components-panel a:hover,
  .components-panel a:focus-visible {
    background: var(--bg-soft);
    color: var(--tx);
    outline: none;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     TOP BAR
═══════════════════════════════════════════════════════════ -->
<header class="topbar">
  <div class="topbar-logo">
    <img src="../../assets/app-logo.png" alt="SlideGenerator" height="32" style="display:block;">
    <span class="brand-pill">BETA</span>
  </div>

  <!-- center spacer + tab pill -->
  <div style="flex:1;display:flex;justify-content:center;">
    <div class="tab-pill" id="mainTabs">
      <span class="tab-indicator" id="mainTabsInd"></span>
      <button class="tab-btn" data-tab="recipes" onclick="setMainTab('recipes')"></button>
      <button class="tab-btn active" data-tab="studio" onclick="setMainTab('studio')"></button>
    </div>
  </div>

  <div class="topbar-right">
    <div class="components-menu">
      <button class="components-trigger" type="button" aria-haspopup="true">
        Components
        <span aria-hidden="true">&#9662;</span>
      </button>
      <nav class="components-panel" aria-label="Component previews">
        <a href="../../preview/icons.html">Icons</a>
        <a href="../../preview/sidebar-items.html">Navigation</a>
        <a href="../../preview/buttons.html">Buttons</a>
        <a href="../../preview/cards.html">Cards</a>
        <a href="../../preview/inputs.html">Inputs</a>
        <a href="../../preview/colors-primary.html">Primary Colors</a>
        <a href="../../preview/type-scale.html">Type Scale</a>
        <a href="../../preview/motion.html">Motion</a>
      </nav>
    </div>

    <!-- 3-mode theme switcher (Light · Dark · System) -->
    <div class="theme-switch" id="themeSwitch">
      <span class="ts-indicator" id="themeInd"></span>
      <button class="ts-btn" data-mode="light"  onclick="setThemeMode('light')"  aria-label="Sáng"></button>
      <button class="ts-btn" data-mode="dark"   onclick="setThemeMode('dark')"   aria-label="Tối"></button>
      <button class="ts-btn" data-mode="system" onclick="setThemeMode('system')" aria-label="Hệ thống"></button>
    </div>

    <button class="icon-btn" id="aboutBtn"    aria-label="Giới thiệu"></button>
    <button class="icon-btn" id="settingsBtn" aria-label="Cài đặt"></button>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════
     MAIN
═══════════════════════════════════════════════════════════ -->
<main class="app-main">
  <div id="page"></div>
</main>

<!-- modal mount -->
<div id="modalMount"></div>

<!-- mock data + icons -->
<script src="../../app/studio-data.js"></script>

<!-- main app -->
<script src="../../app/studio-app.js"></script>
</body>
</html>
